name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy dist to Aliyun ECS
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_SSH_PORT: ${{ secrets.ALIYUN_SSH_PORT }}
          ALIYUN_SSH_USER: ${{ secrets.ALIYUN_SSH_USER }}
          ALIYUN_SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          ALIYUN_DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          ALIYUN_SSH_PORT="${ALIYUN_SSH_PORT:-22}"

          required_vars=("ALIYUN_HOST" "ALIYUN_SSH_USER" "ALIYUN_SSH_PRIVATE_KEY" "ALIYUN_DEPLOY_PATH")
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done

          if [[ ! "$ALIYUN_DEPLOY_PATH" =~ ^/ ]]; then
            echo "::error::ALIYUN_DEPLOY_PATH must be an absolute path."
            exit 1
          fi

          SAFE_DEPLOY_PATH="${ALIYUN_DEPLOY_PATH%/}"
          if [ -z "$SAFE_DEPLOY_PATH" ]; then
            SAFE_DEPLOY_PATH="/"
          fi

          case "$SAFE_DEPLOY_PATH" in
            "/"|"/root"|"/home"|"/var"|"/var/www"|"/etc")
              echo "::error::Refusing risky ALIYUN_DEPLOY_PATH: $SAFE_DEPLOY_PATH"
              exit 1
              ;;
          esac

          if [[ ! "$SAFE_DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::ALIYUN_DEPLOY_PATH contains unsupported characters."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$ALIYUN_SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::ALIYUN_SSH_PRIVATE_KEY is not a valid private key after writing to disk."
            echo "::group::Key file debug"
            wc -l ~/.ssh/deploy_key || true
            sed -n '1p;$p' ~/.ssh/deploy_key || true
            echo "::endgroup::"
            exit 1
          fi

          echo "::group::Deploy key fingerprint"
          ssh-keygen -lf ~/.ssh/deploy_key
          echo "::endgroup::"

          SSH_KEYSCAN_ERR_FILE="/tmp/aliyun-ssh-keyscan.err"
          if ! ssh-keyscan -H -p "$ALIYUN_SSH_PORT" "$ALIYUN_HOST" > ~/.ssh/known_hosts 2>"$SSH_KEYSCAN_ERR_FILE"; then
            echo "::error::ssh-keyscan failed for ${ALIYUN_HOST}:${ALIYUN_SSH_PORT}. Details:"
            cat "$SSH_KEYSCAN_ERR_FILE" >&2 || true
            exit 1
          fi

          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::ssh-keyscan returned empty host keys for ${ALIYUN_HOST}:${ALIYUN_SSH_PORT}."
            cat "$SSH_KEYSCAN_ERR_FILE" >&2 || true
            exit 1
          fi

          chmod 644 ~/.ssh/known_hosts

          REMOTE_DEPLOY_PATH_ESCAPED="$(printf "%q" "$SAFE_DEPLOY_PATH")"
          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p $ALIYUN_SSH_PORT"

          ssh $SSH_OPTS "${ALIYUN_SSH_USER}@${ALIYUN_HOST}" "mkdir -p $REMOTE_DEPLOY_PATH_ESCAPED"

          rsync -az --delete \
            -e "ssh $SSH_OPTS" \
            dist/ "${ALIYUN_SSH_USER}@${ALIYUN_HOST}:${REMOTE_DEPLOY_PATH_ESCAPED}/"
