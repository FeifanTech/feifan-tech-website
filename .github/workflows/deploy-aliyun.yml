name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist to Aliyun ECS
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_SSH_PORT: ${{ secrets.ALIYUN_SSH_PORT }}
          ALIYUN_SSH_USER: ${{ secrets.ALIYUN_SSH_USER }}
          ALIYUN_SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          ALIYUN_DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          ALIYUN_SSH_PORT="${ALIYUN_SSH_PORT:-22}"

          required_vars=("ALIYUN_HOST" "ALIYUN_SSH_USER" "ALIYUN_SSH_PRIVATE_KEY" "ALIYUN_DEPLOY_PATH")
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$ALIYUN_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -p "$ALIYUN_SSH_PORT" -H "$ALIYUN_HOST" >> ~/.ssh/known_hosts

          ssh -p "$ALIYUN_SSH_PORT" "${ALIYUN_SSH_USER}@${ALIYUN_HOST}" "mkdir -p '$ALIYUN_DEPLOY_PATH'"

          rsync -az --delete \
            -e "ssh -p $ALIYUN_SSH_PORT" \
            dist/ "${ALIYUN_SSH_USER}@${ALIYUN_HOST}:${ALIYUN_DEPLOY_PATH}/"
